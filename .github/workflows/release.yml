name: Auto Update Version and Changelog

on:
  push:
    tags:
      - 'v*'

jobs:
  update-files:
    runs-on: ubuntu-latest
    # --- PERMISSÃO DE ESCRITA PARA O BOT ZED ---
    permissions:
      contents: write
    # ------------------------------------------
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Get Version and Commits
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s")
          else
            COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s")
          fi
          
          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update Script Version
        run: |
          sed -i "s/\$VERSION = \".*\" # \[AUTO-UPDATE-VERSION\]/\$VERSION = \"${{ steps.vars.outputs.version }}\" # \[AUTO-UPDATE-VERSION\]/g" og_cs2_tool.ps1

      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo -e "## [${{ steps.vars.outputs.version }}] - $DATE\n${{ steps.vars.outputs.commits }}\n" > new_entry.md
          
          if [ -f CHANGELOG.md ]; then
            sed -i '1{/^# Changelog/d}' CHANGELOG.md
            cat new_entry.md CHANGELOG.md > temp_ch.md
          else
            cat new_entry.md > temp_ch.md
          fi
          
          echo -e "# Changelog - CS2 ACT (Autoconfig Tool)\n\n$(cat temp_ch.md)" > CHANGELOG.md
          rm new_entry.md temp_ch.md

      - name: Commit and Push changes
        run: |
          # AGORA ELE SE IDENTIFICA COMO BOT ZED
          git config --local user.email "action@github.com"
          git config --local user.name "Bot Zed"
          git add og_cs2_tool.ps1 CHANGELOG.md
          git commit -m "chore: v${{ steps.vars.outputs.version }} liberada pelo Bot Zed [skip ci]"
          git push origin main