name: Auto Update Version and Changelog

on:
  push:
    tags:
      - 'v*'

jobs:
  update-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # IMPORTANTE: Baixa o histórico para o robô ler os commits

      - name: Get Version and Commits
        id: vars
        run: |
          # Extrai a versão da Tag
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Tenta encontrar a tag anterior para comparar
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Se houver tag anterior, pega os commits entre elas. Se não, pega todos.
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s")
          else
            COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s")
          fi
          
          # Limpa caracteres que podem quebrar o script e salva os commits
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update og_cs2_tool.ps1
        run: |
          sed -i "s/\$VERSION = \".*\" # \[AUTO-UPDATE-VERSION\]/\$VERSION = \"${{ steps.vars.outputs.version }}\" # \[AUTO-UPDATE-VERSION\]/g" og_cs2_tool.ps1

      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +'%Y-%m-%d')
          # Cria a entrada formatada com a versão, data e os commits reais
          echo -e "## [${{ steps.vars.outputs.version }}] - $DATE\n${{ steps.vars.outputs.commits }}\n\n$(cat CHANGELOG.md)" > CHANGELOG.md
          # Remove duplicatas de cabeçalho (se o comando acima repetir o título)
          sed -i '1{/^# Changelog/d}' CHANGELOG.md
          # Garante que o título esteja no topo
          sed -i '1i # Changelog - CS2 ACT (Autoconfig Tool)\n' CHANGELOG.md

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add og_cs2_tool.ps1 CHANGELOG.md
          # O [skip ci] evita que o robô entre em loop infinito
          git commit -m "chore: atualizando para v${{ steps.vars.outputs.version }} [skip ci]"
          git push origin main